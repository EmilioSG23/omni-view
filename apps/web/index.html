<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>OmniView</title>
		<link rel="icon" href="/omni-view.svg" type="image/svg+xml" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap"
			rel="stylesheet"
		/>
	</head>
	<body>
		<div id="root"></div>
		<!-- Apply persisted theme before first paint to avoid FOUC -->
		<script>
			(function () {
				try {
					var t = localStorage.getItem("omniview:theme");
					if (t) document.documentElement.setAttribute("data-theme", t);
				} catch (e) {}
			})();
		</script>
		<script type="module" src="/src/main.tsx"></script>
	</body>
</html>
